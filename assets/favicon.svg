<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E6E55"/>
      <stop offset="1" stop-color="#14231C"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#markGrad)"/>

  <!-- film sprocket holes, left edge -->
  <circle cx="8" cy="14" r="2.6" fill="#F0A202"/>
  <circle cx="8" cy="32" r="2.6" fill="#F0A202"/>
  <circle cx="8" cy="50" r="2.6" fill="#F0A202"/>

  <!-- film sprocket holes, right edge -->
  <circle cx="56" cy="14" r="2.6" fill="#F0A202"/>
  <circle cx="56" cy="32" r="2.6" fill="#F0A202"/>
  <circle cx="56" cy="50" r="2.6" fill="#F0A202"/>

  <!-- monogram -->
  <text x="32" y="41" text-anchor="middle"
        font-family="'Space Grotesk','Arial',sans-serif" font-weight="700"
        font-size="26" fill="#FFFFFF" letter-spacing="-1">eS</text>
</svg>
