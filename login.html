</head>
<body>
<header class="site-header">
  <div class="container nav-wrap">
    <a href="index.html" class="brand"><img src="assets/logo.svg" alt="e-Studio logo" class="mark"> e-Studio</a>
    <nav class="main-nav">
      <a href="index.html">হোম</a>
      <a href="jobs.html">চাকরি</a>
      <a href="admission.html">ভর্তি</a>
      <a href="formats.html">ফরমেট</a>
      <a href="tools.html">টুলস্‌</a>
      <a href="photo-studio.html">ফটো স্টুডিও</a>
      <a href="links.html">লিংক</a>
      <a href="packages.html">প্যাকেজ</a>
      <a href="blog.html">ব্লগ</a>
    </nav>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline btn-sm">Login</a>
      <a href="register.html" class="btn btn-accent btn-sm">Register</a>
      <button class="menu-toggle" aria-label="মেনু">☰</button>
    </div>
  </div>
</header>
<div class="sprocket-rule"></div>

<section>
  <div class="container">
    <div class="auth-wrap">
      <h2>স্বাগতম ফিরে এলেন</h2>
      <p class="auth-sub muted">আপনার e-Studio অ্যাকাউন্টে লগইন করুন</p>
      <div class="notice" id="form-notice" style="display:none;"></div>
      <form onsubmit="handleAuthDemo(event, 'এটি একটি ডেমো ফর্ম — লাইভ সাইটে এখানে সত্যিকারের লগইন যুক্ত হবে।')">
        <div class="field"><label>ইমেইল / মোবাইল নাম্বার</label><input type="text" required placeholder="you@example.com"></div>
        <div class="field"><label>পাসওয়ার্ড</label><input type="password" required placeholder="••••••••"></div>
        <button type="submit" class="btn btn-accent btn-block">লগইন করুন</button>
      </form>
      <div class="divider">অথবা</div>
      <button class="btn btn-outline btn-block">Google দিয়ে লগইন</button>
      <p class="text-center" style="margin-top:18px;font-size:.9rem;">অ্যাকাউন্ট নেই? <a href="register.html" style="color:var(--accent-2);font-weight:600;">নিবন্ধন করুন</a></p>
    </div>
  </div>
</section>

<div class="sprocket-rule"></div>
<footer class="site-footer" id="site-footer"></footer>

<script src="assets/footer.js"></script>
